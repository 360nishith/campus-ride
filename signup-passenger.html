<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passenger Signup | Campus Ride</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Campus Ride home">
        <span class="brand-mark">CR</span>
        <span>CAMPUS RIDE</span>
      </a>

      <nav class="nav-actions" aria-label="Account actions">
        <div class="dropdown">
          <button class="nav-button" type="button" aria-haspopup="true">
            Signup
            <span aria-hidden="true">&#9662;</span>
          </button>
          <div class="dropdown-menu">
            <a href="signup-passenger.html">Passenger</a>
            <a href="signup-rider.html">Rider</a>
          </div>
        </div>

        <div class="dropdown">
          <button class="nav-button nav-button-primary" type="button" aria-haspopup="true">
            Login
            <span aria-hidden="true">&#9662;</span>
          </button>
          <div class="dropdown-menu">
            <a href="login-passenger.html">Passenger</a>
            <a href="login-rider.html">Rider</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="auth-main">
      <form class="account-card auth-card" data-account-form data-mode="signup" data-role="passenger" novalidate>
        <span class="role-label">Passenger Signup</span>
        <h1>Create passenger account</h1>

        <label for="passenger-signup-name">Full name</label>
        <input id="passenger-signup-name" name="name" type="text" autocomplete="name" required />

        <label for="passenger-signup-email">NMAMIT email</label>
        <input
          id="passenger-signup-email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="name@nmamit.in"
          required
        />
        <p class="form-error" data-email-error aria-live="polite"></p>

        <label for="passenger-signup-password">Set password</label>
        <input
          id="passenger-signup-password"
          name="password"
          type="password"
          autocomplete="new-password"
          minlength="6"
          required
        />

        <button type="submit">Create passenger account</button>
      </form>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
