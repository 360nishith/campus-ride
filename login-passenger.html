<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passenger Login | Campus Ride</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Campus Ride home">
        <span class="brand-mark">CR</span>
        <span>CAMPUS RIDE</span>
      </a>

      <nav class="nav-actions" aria-label="Account actions">
        <div class="dropdown">
          <button class="nav-button" type="button" aria-haspopup="true">
            Signup
            <span aria-hidden="true">&#9662;</span>
          </button>
          <div class="dropdown-menu">
            <a href="signup-passenger.html">Passenger</a>
            <a href="signup-rider.html">Rider</a>
          </div>
        </div>

        <div class="dropdown">
          <button class="nav-button nav-button-primary" type="button" aria-haspopup="true">
            Login
            <span aria-hidden="true">&#9662;</span>
          </button>
          <div class="dropdown-menu">
            <a href="login-passenger.html">Passenger</a>
            <a href="login-rider.html">Rider</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="auth-main">
      <form class="account-card auth-card" data-account-form data-mode="login" data-role="passenger" novalidate>
        <span class="role-label">Passenger Login</span>
        <h1>Login as passenger</h1>

        <label for="passenger-login-userid">User ID</label>
        <input
          id="passenger-login-userid"
          name="email"
          type="email"
          autocomplete="username"
          placeholder="name@nmamit.in"
          required
        />
        <p class="form-error" data-email-error aria-live="polite"></p>

        <label for="passenger-login-password">Password</label>
        <input
          id="passenger-login-password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        />

        <button type="submit">Login as passenger</button>
        <a class="forgot-link" href="forgot-password.html">Forgot password?</a>
      </form>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
